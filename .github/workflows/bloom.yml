name: Ecosystem - Midday Bloom

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  grow:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bloom Leaves
        run: |
          node src/index.js bloom
          node src/index.js render

      - name: Commit state
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/state.json data/chronicle.md bonsai.svg README.md
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "🌸 Midday Bloom: Leaves and flowers have sprouted"
            git push
          fi
