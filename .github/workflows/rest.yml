name: Ecosystem - Evening Rest

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

env:
  GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
  GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}

jobs:
  grow:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Evening Rest
        run: |
          node src/index.js rest
          node src/index.js render

      - name: Commit state
        run: |
          git config --local user.name "$GIT_USER_NAME"
          git config --local user.email "$GIT_USER_EMAIL"

          git add data/state.json data/chronicle.md bonsai.svg README.md

          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "🌙 Evening Rest: The digital ecosystem slumbers"
            git pull --rebase
            git push
          fi