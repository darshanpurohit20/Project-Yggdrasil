name: Ecosystem - Morning Sprout

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  grow:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sprout Branches
        run: |
          node src/index.js sprout
          node src/index.js render

      - name: Commit state using GitHub Actions Bot
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/state.json data/chronicle.md bonsai.svg README.md

          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "🌿 Morning Sprout: New branches have grown"
            git pull --rebase
            git push
          fi